<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Banking Search - Demo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 40px 20px;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    h1 {
      color: white;
      text-align: center;
      margin-bottom: 40px;
      font-size: 36px;
    }

    .demo-card {
      background: white;
      border-radius: 12px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      margin-bottom: 30px;
    }

    .theme-toggle {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      justify-content: center;
    }

    .theme-btn {
      padding: 10px 20px;
      border: 2px solid #667eea;
      background: white;
      color: #667eea;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
    }

    .theme-btn:hover {
      background: #667eea;
      color: white;
    }

    .theme-btn.active {
      background: #667eea;
      color: white;
    }

    .search-wrapper {
      margin-bottom: 30px;
    }

    .event-log {
      background: #f5f5f5;
      border-radius: 8px;
      padding: 20px;
      max-height: 300px;
      overflow-y: auto;
    }

    .event-log h3 {
      margin-bottom: 15px;
      color: #333;
    }

    .event-item {
      background: white;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 4px;
      font-size: 14px;
      border-left: 3px solid #667eea;
    }

    .event-item .event-type {
      font-weight: 600;
      color: #667eea;
    }

    .event-item .event-time {
      font-size: 12px;
      color: #999;
    }

    smart-search {
      --search-primary-color: #0066cc;
      --search-background-color: #ffffff;
      --search-text-color: #333333;
      --search-border-color: #dddddd;
      --search-hover-color: #f5f5f5;
      --search-selected-color: #e6f2ff;
      --search-focus-color: #0066cc;
    }

    smart-search.dark {
      --search-primary-color: #4da6ff;
      --search-background-color: #2d2d2d;
      --search-text-color: #ffffff;
      --search-border-color: #444444;
      --search-hover-color: #3d3d3d;
      --search-selected-color: #1a4d7a;
      --search-focus-color: #4da6ff;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
      margin-top: 20px;
    }

    .stat-card {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px;
      border-radius: 8px;
      text-align: center;
    }

    .stat-value {
      font-size: 32px;
      font-weight: bold;
      margin-bottom: 5px;
    }

    .stat-label {
      font-size: 14px;
      opacity: 0.9;
    }
  </style>
  <script type="module" crossorigin src="/assets/index-CXs78tfU.js"></script>
</head>
<body>
  <div class="container">
    <h1>🏦 Smart Banking Search</h1>

    <div class="demo-card">
      <div class="theme-toggle">
        <button class="theme-btn active" onclick="setTheme('light', this)">☀️ Light</button>
        <button class="theme-btn" onclick="setTheme('dark', this)">🌙 Dark</button>
      </div>

      <div class="search-wrapper">
        <smart-search id="search"></smart-search>
      </div>

      <div class="stats">
        <div class="stat-card">
          <div class="stat-value" id="totalResults">50</div>
          <div class="stat-label">Total Results</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="searchCount">0</div>
          <div class="stat-label">Searches</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="selectCount">0</div>
          <div class="stat-label">Selections</div>
        </div>
      </div>
    </div>

    <div class="demo-card">
      <div class="event-log">
        <h3>Event Log</h3>
        <div id="events"></div>
      </div>
    </div>
  </div>

</body>
</html>
